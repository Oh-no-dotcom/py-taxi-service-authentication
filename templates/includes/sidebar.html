<ul class="sidebar-nav">
  {% if user.is_authenticated %}
    <li>
      <a href="{% url 'taxi:driver-detail' user.id %}" class="btn btn-info">
        User: {{ user.username }}
      </a>
    </li>
    <form action="{% url 'taxi:logout' %}" method="post">
      {% csrf_token %}
      <button type="submit" class="btn btn-info">
        Log out
      </button>
    </form>
    {% else %}
    <li><a href="{% url 'taxi:login' %}" class="btn btn-info">
      Log in
    </a></li>
  {% endif %}

  <br>
  <li><a href="{% url "taxi:index" %}" class="btn btn-info">Home page</a></li>
  <li><a href="{% url "taxi:manufacturer-list" %}" class="btn btn-info">Manufacturers</a></li>
  <li><a href="{% url "taxi:car-list" %}" class="btn btn-info">Cars</a></li>
  <li><a href="{% url "taxi:driver-list" %}" class="btn btn-info">Drivers</a></li>
</ul>
